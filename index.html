<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meduza Chat</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      text-align: center;
      padding: 60px 40px;
      position: relative;
    }

    /* Horizontal thin line across the hero */
    .hero-line {
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--border-mid) 20%, var(--border-mid) 80%, transparent 100%);
      pointer-events: none;
      opacity: 0.5;
    }

    .hero-ornament {
      font-family: 'DM Mono', monospace;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 10px;
      opacity: 0.4;
      margin-bottom: 36px;
      animation: fadeDown 1s ease both;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(44px, 8vw, 90px);
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      letter-spacing: 6px;
      line-height: 1.05;
      margin-bottom: 8px;
      animation: fadeDown 1s ease 0.15s both;
    }

    .hero-title span {
      color: var(--accent);
      font-weight: 300;
    }

    .hero-sub {
      font-family: 'Cormorant SC', serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 8px;
      color: var(--text-ghost);
      text-transform: uppercase;
      margin-bottom: 52px;
      animation: fadeDown 1s ease 0.3s both;
    }

    .hero-desc {
      max-width: 420px;
      color: var(--text-faint);
      font-size: 17px;
      font-style: italic;
      line-height: 1.85;
      margin-bottom: 52px;
      animation: fadeDown 1s ease 0.45s both;
    }

    .hero-btns {
      display: flex;
      gap: 16px;
      animation: fadeDown 1s ease 0.6s both;
    }

    /* Small decorative crosses */
    .cross {
      position: absolute;
      color: var(--gold);
      font-size: 8px;
      opacity: 0.2;
      letter-spacing: 2px;
      animation: fadeDown 1.5s ease both;
    }
    .cross-tl { top: 80px; left: 80px; animation-delay: 0.8s; }
    .cross-tr { top: 80px; right: 80px; animation-delay: 1s; }
    .cross-bl { bottom: 80px; left: 80px; animation-delay: 1.2s; }
    .cross-br { bottom: 80px; right: 80px; animation-delay: 1.4s; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo-link"><img src="Untitled.png" alt="Meduza Logo" class="nav-logo"></a>
  <a href="index.html" class="active">Home</a>
  <a href="about.html">About</a>
  <a href="rules.html">Rules</a>
  <a href="chat.html">Chat</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="page">
  <section class="hero">
    <div class="cross cross-tl">✦ ✦ ✦</div>
    <div class="cross cross-tr">✦ ✦ ✦</div>
    <div class="cross cross-bl">✦ ✦ ✦</div>
    <div class="cross cross-br">✦ ✦ ✦</div>

    <p class="hero-ornament">✦ &nbsp; ✦ &nbsp; ✦</p>

    <h1 class="hero-title">Meduza <span>Chat</span></h1>
    <p class="hero-sub">Spațiu anonim &nbsp;·&nbsp; Fără judecată</p>

    <p class="hero-desc">
      Un loc unde gândurile prea grele pot fi rostite — fără nume, fără urme, fără să te întrebi cum vei arăta mâine.
    </p>

    <div class="hero-btns">
      <a href="chat.html" class="btn btn-primary">Intră în Chat</a>
      <a href="about.html" class="btn btn-secondary">Despre noi</a>
    </div>
  </section>

  <footer>
    <span>✦</span> &nbsp; Meduza Chat &nbsp; <span>✦</span>
  </footer>
</div>

</body>
</html>
